# YOLOv8m-Wind: YOLOv8m + CBAM attention for wind turbine blade damage detection
#
# Improvements over the stock yolov8m.yaml baseline:
#   1. CBAM (Convolutional Block Attention Module) added after SPPF and after
#      each C2f block in the neck (P3/P4/P5 feature maps).  CBAM focuses the
#      detector on defect-rich regions and relevant channels, which is critical
#      for small cracks and dirt patches on turbine blades.
#   2. 2-class output head (dirt, damage) replacing the default 80-class COCO head.
#
# Reference: Woo et al., ECCV 2018, https://arxiv.org/abs/1807.06521
#
# Register the CBAM module BEFORE loading this YAML:
#   from models import register_custom_modules
#   register_custom_modules()

# --- Scaling parameters (medium model) ---
nc: 2          # number of classes: 0=dirt  1=damage
scales:
  m: [0.67, 0.75, 768]

# --- Backbone ---
backbone:
  # [from, repeats, module, args]
  - [-1, 1, Conv,  [64, 3, 2]]      # 0  P1/2
  - [-1, 1, Conv,  [128, 3, 2]]     # 1  P2/4
  - [-1, 3, C2f,   [128, True]]     # 2
  - [-1, 1, Conv,  [256, 3, 2]]     # 3  P3/8
  - [-1, 6, C2f,   [256, True]]     # 4  <- P3 skip connection
  - [-1, 1, Conv,  [512, 3, 2]]     # 5  P4/16
  - [-1, 6, C2f,   [512, True]]     # 6  <- P4 skip connection
  - [-1, 1, Conv,  [1024, 3, 2]]    # 7  P5/32
  - [-1, 3, C2f,   [1024, True]]    # 8
  - [-1, 1, SPPF,  [1024, 5]]       # 9
  - [-1, 1, CBAM,  [1024]]          # 10  CBAM on deepest backbone feature

# --- Head (PAN-FPN neck + Detect) ---
head:
  - [-1,  1, nn.Upsample, [None, 2, 'nearest']]  # 11  upsample P5→P4 scale
  - [[-1, 6], 1, Concat,  [1]]                    # 12  cat backbone P4  (ch: 512+1024)
  - [-1,  3, C2f,   [512]]                        # 13
  - [-1,  1, CBAM,  [512]]                        # 14  CBAM on P4 neck feature

  - [-1,  1, nn.Upsample, [None, 2, 'nearest']]  # 15  upsample P4→P3 scale
  - [[-1, 4], 1, Concat,  [1]]                    # 16  cat backbone P3  (ch: 256+512)
  - [-1,  3, C2f,   [256]]                        # 17  P3/8 detection feature
  - [-1,  1, CBAM,  [256]]                        # 18  CBAM on P3 neck feature  (small objects)

  - [-1,  1, Conv,  [256, 3, 2]]                  # 19  down-sample P3→P4
  - [[-1, 14], 1, Concat, [1]]                    # 20  cat P4 neck feature
  - [-1,  3, C2f,   [512]]                        # 21  P4/16 detection feature

  - [-1,  1, Conv,  [512, 3, 2]]                  # 22  down-sample P4→P5
  - [[-1, 10], 1, Concat, [1]]                    # 23  cat P5 backbone feature
  - [-1,  3, C2f,   [1024]]                       # 24  P5/32 detection feature

  - [[18, 21, 24], 1, Detect, [nc]]               # Detect(P3-small, P4-medium, P5-large)
